<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoboLearn | Future of Robotics Education</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Inter','sans-serif'],display:['Space Grotesk','sans-serif']},colors:{brand:{yellow:'#FACC15',dark:'#111827',light:'#F3F4F6'}},animation:{float:'float 6s ease-in-out infinite','pulse-slow':'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite'},keyframes:{float:{'0%,100%':{transform:'translateY(0)'},'50%':{transform:'translateY(-20px)'}}}}}}</script>
    
    <style>
        ::-webkit-scrollbar{width:10px}::-webkit-scrollbar-track{background:#f1f1f1}::-webkit-scrollbar-thumb{background:#FACC15;border-radius:5px}
        
        /* --- 1. THE ANIMATION STYLE --- */
        /* This makes elements hidden and slightly lower by default */
        .reveal {
            opacity: 0;
            transform: translateY(40px) scale(0.9);
            transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* This creates the "Bounce" effect */
        }

        /* This makes them pop into view */
        .reveal.active {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* This makes cards appear one after another (staggered) */
        .delay-1 { transition-delay: 0.1s; }
        .delay-2 { transition-delay: 0.2s; }
        .delay-3 { transition-delay: 0.3s; }

        /* Original Styles */
        .glass-nav{background:rgba(255,255,255,0.9);backdrop-filter:blur(10px);border-bottom:1px solid rgba(0,0,0,0.05)}.dark .glass-nav{background:rgba(17,24,39,0.9);border-bottom:1px solid rgba(255,255,255,0.05)}.hero-pattern{background-image:radial-gradient(#FACC15 1px,transparent 1px);background-size:30px 30px;opacity:0.2}.dark .hero-pattern{opacity:0.1}
    </style>
</head>
<body class="font-sans text-gray-800 antialiased bg-white dark:bg-gray-900 dark:text-white transition-colors duration-300">
    
    <nav class="fixed w-full z-50 glass-nav transition-all duration-300" id="navbar">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex-shrink-0 flex items-center cursor-pointer" onclick="window.scrollTo(0,0)">
                    <div class="w-10 h-10 bg-brand-yellow rounded-lg flex items-center justify-center mr-2 shadow-lg"><i class="fas fa-robot text-black text-xl"></i></div>
                    <span class="font-display font-bold text-2xl tracking-tight text-gray-900 dark:text-white">Robo<span class="text-brand-yellow">Learn</span></span>
                </div>
                <div class="hidden md:flex space-x-8 items-center">
                    <a href="#home" class="text-gray-600 dark:text-gray-300 hover:text-black dark:hover:text-white font-medium transition">Home</a>
                    <button id="darkModeToggle" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-800 text-gray-600 dark:text-yellow-400"><i class="fas fa-moon dark:hidden"></i><i class="fas fa-sun hidden dark:block"></i></button>
                </div>
            </div>
        </div>
    </nav>

    <section id="home" class="relative pt-32 pb-20 lg:pt-48 lg:pb-32 overflow-hidden">
        <div class="absolute inset-0 hero-pattern z-0"></div>
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
                <div class="text-center lg:text-left reveal"> <h1 class="text-5xl lg:text-7xl font-display font-bold text-gray-900 dark:text-white leading-tight mb-6">Build the <span class="text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 to-orange-500">Future</span>.</h1>
                    <p class="text-xl text-gray-600 dark:text-gray-300 mb-8">Master Robotics with zero experience.</p>
                </div>
                <div class="reveal delay-2"> <img src="https://images.unsplash.com/photo-1485827404703-89b55fcc595e?auto=format&fit=crop&w=800&q=80" class="rounded-3xl shadow-2xl">
                </div>
            </div>
        </div>
    </section>

    <section class="py-20 bg-gray-50 dark:bg-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                <div class="bg-white dark:bg-gray-900 p-8 rounded-2xl reveal delay-1">
                    <h4 class="text-xl font-bold mb-3">Mechanical</h4>
                    <p class="text-gray-600">The body of the robot.</p>
                </div>
                <div class="bg-white dark:bg-gray-900 p-8 rounded-2xl reveal delay-2">
                    <h4 class="text-xl font-bold mb-3">Electrical</h4>
                    <p class="text-gray-600">The nervous system.</p>
                </div>
                <div class="bg-white dark:bg-gray-900 p-8 rounded-2xl reveal delay-3">
                    <h4 class="text-xl font-bold mb-3">Software</h4>
                    <p class="text-gray-600">The brain and code.</p>
                </div>
            </div>
        </div>
    </section>

    <script>
        /* --- 2. THE REVEAL SENSOR --- */
        function reveal() {
            var reveals = document.querySelectorAll(".reveal");
            for (var i = 0; i < reveals.length; i++) {
                var windowHeight = window.innerHeight;
                var elementTop = reveals[i].getBoundingClientRect().top;
                var elementVisible = 150; // Triggers when the element is 150px into the view
                
                if (elementTop < windowHeight - elementVisible) {
                    reveals[i].classList.add("active");
                }
            }
        }

        // Listen for scrolling
        window.addEventListener("scroll", reveal);
        // Run once on load to show elements already on screen
        window.addEventListener("load", reveal);

        /* Original Logic for Dark Mode */
        const darkModeToggle=document.getElementById('darkModeToggle');
        darkModeToggle.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
        });
    </script>
</body>
</html>
